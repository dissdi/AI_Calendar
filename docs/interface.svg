<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI','Apple SD Gothic Neo',sans-serif">
  <rect width="1000" height="600" rx="10" fill="#0f1115"/>

  <!-- header -->
  <rect x="0" y="0" width="1000" height="46" fill="#181b22"/>
  <line x1="0" y1="46" x2="1000" y2="46" stroke="#2a2f3a"/>
  <rect x="16" y="12" width="24" height="22" rx="6" fill="#1f232c" stroke="#2a2f3a"/>
  <text x="28" y="28" fill="#9aa3b2" font-size="14" text-anchor="middle">◧</text>
  <text x="50" y="29" fill="#e7e9ee" font-size="15" font-weight="700">🎯 Multi-task Scheduler</text>
  <rect x="838" y="13" width="62" height="20" rx="10" fill="#262b36" stroke="#2a2f3a"/>
  <text x="869" y="27" fill="#9aa3b2" font-size="11" text-anchor="middle">model</text>
  <rect x="908" y="12" width="24" height="22" rx="6" fill="#1f232c" stroke="#2a2f3a"/>
  <text x="920" y="28" fill="#9aa3b2" font-size="14" text-anchor="middle">◨</text>
  <rect x="938" y="12" width="24" height="22" rx="6" fill="#1f232c" stroke="#2a2f3a"/>
  <text x="950" y="28" fill="#9aa3b2" font-size="13" text-anchor="middle">⚙</text>

  <!-- sidebar -->
  <rect x="0" y="46" width="220" height="554" fill="#181b22"/>
  <line x1="220" y1="46" x2="220" y2="600" stroke="#2a2f3a"/>
  <text x="16" y="76" fill="#9aa3b2" font-size="10" letter-spacing="1">STRUCTURE</text>
  <rect x="14" y="84" width="192" height="34" rx="8" fill="#1f232c" stroke="#ffb454"/>
  <circle cx="30" cy="101" r="5" fill="#ffb454"/>
  <text x="44" y="105" fill="#e7e9ee" font-size="12">🗂 Coordinator</text>
  <text x="16" y="146" fill="#9aa3b2" font-size="10" letter-spacing="1">TASKS</text>
  <rect x="170" y="136" width="40" height="16" rx="6" fill="#6c8cff"/>
  <text x="190" y="148" fill="#fff" font-size="10" text-anchor="middle">+ Add</text>
  <g font-size="12" fill="#e7e9ee">
    <circle cx="30" cy="172" r="5" fill="#6c8cff"/><text x="44" y="176">Task 1</text>
    <circle cx="30" cy="198" r="5" fill="#3ecf8e"/><text x="44" y="202">Task 2</text>
    <circle cx="30" cy="224" r="5" fill="#ff7eb6"/><text x="44" y="228">Task 3</text>
  </g>
  <line x1="12" y1="248" x2="208" y2="248" stroke="#2a2f3a"/>
  <text x="16" y="270" fill="#9aa3b2" font-size="10" letter-spacing="1">📢 UPDATE FEED</text>
  <g font-size="10.5" fill="#9aa3b2">
    <text x="16" y="292">Task 1 → calendar sync</text>
    <text x="16" y="312">Coordinator → notice updated</text>
    <text x="16" y="332">Task 2 → created</text>
  </g>

  <!-- calendar (center) -->
  <text x="244" y="78" fill="#e7e9ee" font-size="14" font-weight="700">June 2026</text>
  <g fill="#1f232c" stroke="#2a2f3a">
    <rect x="540" y="64" width="26" height="22" rx="6"/><rect x="572" y="64" width="40" height="22" rx="6"/><rect x="618" y="64" width="64" height="22" rx="6"/>
  </g>
  <text x="553" y="79" fill="#9aa3b2" font-size="12" text-anchor="middle">›</text>
  <text x="592" y="79" fill="#9aa3b2" font-size="11" text-anchor="middle">Today</text>
  <text x="650" y="79" fill="#9aa3b2" font-size="11" text-anchor="middle">Day view</text>
  <g fill="#9aa3b2" font-size="10" text-anchor="middle">
    <text x="270" y="104">S</text><text x="330" y="104">M</text><text x="390" y="104">T</text><text x="450" y="104">W</text><text x="510" y="104">T</text><text x="570" y="104">F</text><text x="630" y="104">S</text>
  </g>
  <!-- calendar cells -->
  <g>
    <g fill="#181b22" stroke="#2a2f3a">
      <rect x="244" y="112" width="54" height="58" rx="6"/><rect x="304" y="112" width="54" height="58" rx="6"/><rect x="364" y="112" width="54" height="58" rx="6"/><rect x="424" y="112" width="54" height="58" rx="6"/><rect x="484" y="112" width="54" height="58" rx="6"/><rect x="544" y="112" width="54" height="58" rx="6"/><rect x="604" y="112" width="54" height="58" rx="6"/>
      <rect x="244" y="176" width="54" height="58" rx="6"/><rect x="304" y="176" width="54" height="58" rx="6"/><rect x="364" y="176" width="54" height="58" rx="6"/><rect x="424" y="176" width="54" height="58" rx="6"/><rect x="484" y="176" width="54" height="58" rx="6"/><rect x="544" y="176" width="54" height="58" rx="6"/><rect x="604" y="176" width="54" height="58" rx="6"/>
      <rect x="244" y="240" width="54" height="58" rx="6"/><rect x="304" y="240" width="54" height="58" rx="6"/><rect x="364" y="240" width="54" height="58" rx="6"/><rect x="424" y="240" width="54" height="58" rx="6"/><rect x="484" y="240" width="54" height="58" rx="6"/><rect x="544" y="240" width="54" height="58" rx="6"/><rect x="604" y="240" width="54" height="58" rx="6"/>
      <rect x="244" y="304" width="54" height="58" rx="6"/><rect x="304" y="304" width="54" height="58" rx="6"/><rect x="364" y="304" width="54" height="58" rx="6"/><rect x="424" y="304" width="54" height="58" rx="6"/><rect x="484" y="304" width="54" height="58" rx="6"/><rect x="544" y="304" width="54" height="58" rx="6"/><rect x="604" y="304" width="54" height="58" rx="6"/>
    </g>
    <rect x="364" y="304" width="54" height="58" rx="6" fill="none" stroke="#6c8cff"/>
    <rect x="368" y="320" width="46" height="11" rx="2" fill="#6c8cff33"/><rect x="368" y="320" width="3" height="11" fill="#6c8cff"/>
    <rect x="368" y="334" width="46" height="11" rx="2" fill="#3ecf8e33"/><rect x="368" y="334" width="3" height="11" fill="#3ecf8e"/>
    <rect x="368" y="348" width="46" height="11" rx="2" fill="#ff7eb633"/><rect x="368" y="348" width="3" height="11" fill="#ff7eb6"/>
    <rect x="428" y="320" width="46" height="11" rx="2" fill="#6c8cff33"/><rect x="428" y="320" width="3" height="11" fill="#6c8cff"/>
    <rect x="488" y="320" width="46" height="11" rx="2" fill="#ff7eb633"/><rect x="488" y="320" width="3" height="11" fill="#ff7eb6"/>
  </g>
  <!-- roadmap -->
  <line x1="232" y1="386" x2="688" y2="386" stroke="#2a2f3a"/>
  <text x="244" y="406" fill="#9aa3b2" font-size="11">📅 Roadmap</text>
  <rect x="612" y="394" width="68" height="16" rx="6" fill="#1f232c" stroke="#2a2f3a"/>
  <text x="646" y="406" fill="#9aa3b2" font-size="10" text-anchor="middle">By week</text>
  <g font-size="11">
    <text x="244" y="428" fill="#6c8cff" font-weight="700">Task 1</text>
    <text x="244" y="446" fill="#e7e9ee">Week 1 · plan detail line one</text>
    <text x="244" y="464" fill="#e7e9ee">Week 2 · plan detail line two</text>
    <text x="244" y="486" fill="#3ecf8e" font-weight="700">Task 2</text>
    <text x="244" y="504" fill="#e7e9ee">Week 1 · plan detail line one</text>
  </g>
  <line x1="688" y1="46" x2="688" y2="600" stroke="#2a2f3a"/>

  <!-- chat (right) -->
  <circle cx="704" cy="70" r="5" fill="#ffb454"/>
  <text x="716" y="74" fill="#e7e9ee" font-size="13" font-weight="700">Coordinator</text>
  <line x1="688" y1="88" x2="1000" y2="88" stroke="#2a2f3a"/>
  <rect x="704" y="104" width="252" height="86" rx="12" fill="#1f232c" stroke="#2a2f3a"/>
  <g fill="#e7e9ee" font-size="11">
    <text x="716" y="124">Checking all tasks, the conflict</text>
    <text x="716" y="140">clusters on day 1-2. Task 2 and Task 3</text>
    <text x="716" y="156">overlap on the same day.</text>
    <text x="716" y="176">- Suggest splitting the load earlier.</text>
  </g>
  <rect x="724" y="204" width="232" height="46" rx="12" fill="#6c8cff"/>
  <g fill="#fff" font-size="11">
    <text x="736" y="224">Let's move Task 1 to Wednesday.</text>
    <text x="736" y="240">Please update.</text>
  </g>
  <g fill="#1f232c" stroke="#2a2f3a">
    <rect x="704" y="520" width="92" height="22" rx="6"/><rect x="802" y="520" width="100" height="22" rx="6"/>
  </g>
  <text x="750" y="535" fill="#9aa3b2" font-size="10" text-anchor="middle">Check conflicts</text>
  <text x="852" y="535" fill="#9aa3b2" font-size="10" text-anchor="middle">Summarize notice</text>
  <rect x="704" y="552" width="216" height="34" rx="10" fill="#1f232c" stroke="#2a2f3a"/>
  <text x="716" y="573" fill="#9aa3b2" font-size="11">Type… (Enter to send)</text>
  <rect x="928" y="552" width="44" height="34" rx="8" fill="#6c8cff"/>
  <text x="950" y="573" fill="#fff" font-size="11" text-anchor="middle">Send</text>
</svg>
